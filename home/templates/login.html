<!DOCTYPE html>
<html lang="en">

<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katugunan | Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            background: linear-gradient(135deg, #044a27 0%, #0a733f 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Outfit', sans-serif;
        }

        .login-container {
            background: #ffffff;
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
            max-width: 420px;
            width: 100%;
            border-top: 5px solid #f1c40f;
        }

        .btn-primary {
            background-color: #046a38;
            border-color: #046a38;
            font-weight: 500;
            padding: 10px;
            border-radius: 8px;
            transition: all 0.2s ease;
        }

        .btn-primary:hover {
            background-color: #03522b;
            border-color: #03522b;
        }

        .form-control:focus {
            border-color: #046a38;
            box-shadow: 0 0 0 3px rgba(4, 106, 56, 0.15);
        }

        .brand-logo {
            transition: transform 0.3s ease;
        }

        .brand-logo:hover {
            transform: scale(1.08) rotate(2deg);
        }
    </style>
</head>

<body>

    <div class="login-container my-5">
        <div class="text-center mb-3">
            <img src="{% static 'usm_logo.png' %}" alt="USM Logo" width="70" height="70" class="brand-logo">
        </div>
        <h5 class="text-center font-weight-bold mb-1" style="color: #044a27;">University of Southern Mindanao</h5>
        <p class="text-center text-muted small mb-4">Client Satisfaction Survey Portal</p>
        <hr class="mb-4">
        
        <h3 class="text-center text-success mb-2" style="color: #046a38 !important; font-weight: 600;">Welcome Back!</h3>
        <p class="text-center text-muted small mb-4">Login to access your administration dashboard</p>
        
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary btn-block w-100 mt-3">Sign In</button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
