{% load crispy_forms_tags %}

<form method="post" hx-post="{% if form.instance.pk %}{% url 'home:question_update' form.instance.pk %}{% else %}{% url 'home:question_create' %}{% endif %}" 
    hx-target="{% if form.instance.pk %}#question-{{ form.instance.pk }}{% else %}#question-list{% endif %}" 
    hx-swap="{% if form.instance.pk %}outerHTML{% else %}beforeend{% endif %}"
    hx-on="htmx:afterRequest: closeModal()">
    
    {% csrf_token %}
 
    <div class="form-group mb-3">
        {{ form.question_id|as_crispy_field }}
    </div>
    <div class="form-group mb-3">
        {{ form.question_question|as_crispy_field }}
    </div>
    <div class="form-group mb-3">
        {{ form.question_type|as_crispy_field }}
    </div>

    <div class="modal-footer px-0 pb-0 pt-3">
        <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
        <button type="submit" class="btn btn-success">Save changes</button>
    </div>
</form>
