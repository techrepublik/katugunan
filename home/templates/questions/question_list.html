{% extends 'admin_base.html' %}

{% block content %}
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Question List</h2>
        <button class="btn btn-success" hx-get="{% url 'home:question_create' %}" hx-trigger="click" hx-target="#modal-body" data-toggle="modal" data-target="#crudModal"><i class="fas fa-plus mr-1"></i> Add New Question</button>
    </div>

    <table class="table-premium table table-sm table-hover table-striped table-bordered" id="question-table">
        <thead>
            <tr>
                <th>Id</th>
                <th>Question</th>
                <th>Type</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="question-list">
            {% for question in questions %}
                {% include "questions/question_row.html" %}
            {% endfor %}
        </tbody>
    </table>
{% endblock content %}
