{% load crispy_forms_tags %}

<form method="post" hx-post="{% if form.instance.pk %}{% url 'home:service_update' form.instance.pk %}{% else %}{% url 'home:service_create' %}{% endif %}" 
    hx-target="{% if form.instance.pk %}#service-{{ form.instance.pk }}{% else %}#service-list{% endif %}" 
    hx-swap="{% if form.instance.pk %}outerHTML{% else %}beforeend{% endif %}"
    hx-trigger="submit" hx-on="htmx:afterRequest: closeModal()">

    {% csrf_token %}
 
    <div class="form-group mb-3">
        {{ form.service_name|as_crispy_field }}
    </div>
    <div class="form-group mb-3">
        {{ form.service_type|as_crispy_field }}
    </div>
    <div class="form-group mb-3">
        {{ form.service_no|as_crispy_field }}
    </div>
    <div class="form-group mb-3">
        {{ form.service_time|as_crispy_field }}
    </div>
    <div class="form-group mb-3">
        {{ form.service_is_payment|as_crispy_field }}
    </div>
    <div class="form-group mb-3">
        {{ form.position_id|as_crispy_field }}
    </div>

    <div class="modal-footer px-0 pb-0 pt-3">
        <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
        <button type="submit" class="btn btn-success">Save changes</button>
    </div>
</form>
