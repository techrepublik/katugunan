{% extends 'admin_base.html' %}

{% block content %}
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Service List</h2>
        <button class="btn btn-success" hx-get="{% url 'home:service_create' %}" hx-target="#modal-body" data-toggle="modal" data-target="#crudModal"><i class="fas fa-plus mr-1"></i> Add New Service</button>
    </div>

    <table class="table-premium table table-sm table-hover table-striped table-bordered" id="service-table">
        <thead>
            <tr>
                <th>Service Name</th>
                <th>Short Name</th>
                <th>Position</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="service-list">
            {% for service in services %}
                {% include "services/service_row.html" %}
            {% endfor %}
        </tbody>
    </table>
{% endblock %}
