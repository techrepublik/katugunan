{% load crispy_forms_tags %}

<form method="post" 
    hx-post="{% if form.instance.pk %}{% url 'home:unit_update' form.instance.pk %}{% else %}{% url 'home:unit_create' %}{% endif %}" 
    hx-target="{% if form.instance.pk %}#unit-{{ form.instance.pk }}{% else %}#unit-list{% endif %}" 
    hx-swap="{% if form.instance.pk %}outerHTML{% else %}beforeend{% endif %}"
    hx-on="htmx:afterRequest: closeModal()">
    
    {% csrf_token %}
 
    <div class="form-group mb-3">
        {{ form.unit_name|as_crispy_field }}
    </div>
    <div class="form-group mb-3">
        {{ form.unit_short_name|as_crispy_field }}
    </div>
    <div class="form-group mb-3">
        {{ form.unit_type|as_crispy_field }}
    </div>
    <div class="form-group mb-3">
        {{ form.branch|as_crispy_field }}
    </div>

    <div class="modal-footer px-0 pb-0 pt-3">
        <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
        <button type="submit" class="btn btn-success">Save changes</button>
    </div>
</form>
