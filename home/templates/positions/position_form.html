{% load crispy_forms_tags %}

<form method="post"
    hx-post="{% if form.instance.pk %}{% url 'home:position_update' form.instance.pk %}{% else %}{% url 'home:position_create' %}{% endif %}"
    hx-target="{% if form.instance.pk %}#position-{{ form.instance.pk }}{% else %}#position-list{% endif %}"
    hx-swap="{% if form.instance.pk %}outerHTML{% else %}beforeend{% endif %}"
    hx-trigger="submit" hx-on="htmx:afterRequest: closeModal()">

    {% csrf_token %}
 
    <div class="form-group mb-3">
        {{ form.position_name|as_crispy_field }}
    </div>
    <div class="form-group mb-3">
        {{ form.position_short|as_crispy_field }}
    </div>
    <div class="form-group mb-3">
        {{ form.position_status|as_crispy_field }}
    </div>
    <div class="form-group mb-3">
        {{ form.department|as_crispy_field }}
    </div>

    <div class="modal-footer px-0 pb-0 pt-3">
        <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
        <button type="submit" class="btn btn-success">Save changes</button>
    </div>
</form>
