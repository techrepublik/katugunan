{% extends 'admin_base.html' %}

{% block content %}
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Position List</h2>
        <button class="btn btn-success" hx-get="{% url 'home:position_create' %}" hx-target="#modal-body" data-toggle="modal" data-target="#crudModal"><i class="fas fa-plus mr-1"></i> Add New Position</button>
    </div>

    <table class="table-premium table table-sm table-hover table-striped table-bordered" id="position-table">
        <thead>
            <tr>
                <th>Position Name</th>
                <th>Short name</th>
                <th>Department</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="position-list">
            {% for position in positions %}
                {% include "positions/position_row.html" %}
            {% endfor %}
        </tbody>
    </table>
{% endblock %}
